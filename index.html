<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./bootstrap.css">
    <link rel="stylesheet" href="./style/login.css">
</head>
<body>
    <main class="main" role="main">
        <div class="container">
            <div class="row">
                <div class="offset-md-3 col-md-6">
                    <form  class="form-container">
                        <h2>用户登录</h2>
                        <div class="mb-3">
                          <label for="exampleInputEmail1" class="form-label">账号</label>
                          <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="输入账号">
                          <!-- <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div> -->
                        </div>
                        <div class="mb-3">
                          <label for="exampleInputPassword1" class="form-label">密码</label>
                          <input type="password" class="form-control" id="exampleInputPassword1" placeholder="密码最少6位">
                        </div>
                        <div class="mb-3 form-check">
                          <input type="checkbox" class="form-check-input" id="exampleCheck1">
                          <label class="form-check-label" for="exampleCheck1">记住密码</label>
                        </div>
                        <button type="submit" class="btn btn-primary" >Submit</button>
                        <input class="btn btn-primary" type="reset" value="Reset">
                      </form>
                </div>
            </div>
    
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            Development team: <a href="./group.html">Placeholder Group</a>.
        </div>

    </footer>

</body>
</html>
